version: "3.8"

services:
  app:
    build: .
    container_name: weel-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/weel
      - SYNC_DATABASE_URL=postgresql://postgres:postgres@db:5432/weel
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3001,http://localhost:5173
    depends_on:
      - db
      - redis
      - minio
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:15-alpine
    container_name: weel-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: weel
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: weel-redis
    ports:
      - "6380:6379"

  minio:
    image: minio/minio
    container_name: weel-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  celery_worker:
    build: .
    container_name: weel-celery-worker
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/weel
      - SYNC_DATABASE_URL=postgresql://postgres:postgres@db:5432/weel
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
    depends_on:
      - redis
      - db
    volumes:
      - .:/app
    command: celery -A app.tasks worker -l info

  celery_beat:
    build: .
    container_name: weel-celery-beat
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/weel
      - SYNC_DATABASE_URL=postgresql://postgres:postgres@db:5432/weel
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
    depends_on:
      - redis
      - db
    volumes:
      - .:/app
    command: celery -A app.tasks beat -l info

  frontend:
    build:
      context: ../weel
      dockerfile: ../weel/Dockerfile
    container_name: weel-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://weel-api:8000
    depends_on:
      - app

  admin:
    build:
      context: ../weel-admin
      dockerfile: ../weel-admin/Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
        VITE_WS_URL: ws://localhost:8000
    container_name: weel-admin
    ports:
      - "3001:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000
    depends_on:
      - app

volumes:
  postgres_data:
  minio_data:
