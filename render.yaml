# Render.yaml for Weel Backend
# Set the following environment variables in the Render dashboard:
#   DATABASE_URL
#   SYNC_DATABASE_URL
#   REDIS_URL
#   MINIO_ENDPOINT
#   CORS_ORIGINS

services:
  - type: web
    path: ./ 
    dockerfilePath: ./Dockerfile
    command: >
      sh -c "uvicorn app.main:app --host 0.0.0.0 --port $PORT"